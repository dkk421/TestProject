services:
  api:
    build: .
    container_name: testproject_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: sqlite:///./data/app.db
    depends_on:
      - redis

  worker:
    build: .
    container_name: testproject_worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./data:/app/data
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: sqlite:///./data/app.db
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: testproject_redis
    ports:
      - "6379:6379"
